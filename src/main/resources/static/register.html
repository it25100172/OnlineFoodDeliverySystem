<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f6f9;
        }

        .register-box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#ff5722;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            background:#ff5722;
            color:white;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#e64a19;
        }

        #result{
            margin-top:15px;
            text-align:center;
            color:green;
        }
        .login-btn{

    background:#333;
}

.login-btn:hover{

    background:#111;
}

    </style>

</head>
<body>

<div class="register-box">

    <h2>Create Account</h2>


    <input type="email"
           id="email"
           placeholder="Email">

    <input type="password"
           id="password"
           placeholder="Password">

    <select id="role">

        <option value="CUSTOMER">
            Customer
        </option>

        <option value="DELIVERY">
            Delivery
        </option>

        <option value="RESTAURANT">
            Restaurant
        </option>

    </select>

    <button onclick="registerUser()">
        Register
    </button>
    <button onclick="goLogin()"
            class="login-btn">

        Login

    </button>

    <h3 id="result"></h3>

</div>

<script>

    function goLogin(){

        window.location.href =
            "/login";
    }

    function registerUser(){

        const user = {

            email:
                document.getElementById(
                    "email"
                ).value,

            password:
                document.getElementById(
                    "password"
                ).value,

            role:
                document.getElementById(
                    "role"
                ).value
        };

        fetch('/users', {

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body: JSON.stringify(user)

        })

        .then(response => response.json())

        .then(data => {

            // EMAIL EXISTS
            if(data == null){

                document.getElementById(
                    "result"
                ).innerText =
                    "Account already exists";

                document.getElementById(
                    "result"
                ).style.color =
                    "red";

                return;
            }

            // SUCCESS
            document.getElementById(
                "result"
            ).innerText =
                "Registration Successful";

            document.getElementById(
                "result"
            ).style.color =
                "green";

            setTimeout(() => {

                window.location.href =
                    "/login";

            }, 1000);

        })

        .catch(error => {

            document.getElementById(
                "result"
            ).innerText =
                "Account already exists";

            document.getElementById(
                "result"
            ).style.color =
                "red";

            console.log(error);

        });
    }

</script>

</body>
</html>
