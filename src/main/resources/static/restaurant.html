<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Dashboard - FoodExpress</title>
    <style>
        :root {
            --primary: #ff5722;
            --primary-dark: #e64a19;
            --bg: #f4f6f9;
            --white: #ffffff;
            --text: #333333;
            --gray: #666666;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .navbar {
            background: var(--primary);
            color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .navbar button {
            background: var(--white);
            color: var(--primary);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .navbar button:hover {
            background: #eee;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            margin-bottom: 1.5rem;
            color: var(--primary);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            background: var(--primary);
            color: var(--white);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .food-list, .order-list {
            list-style: none;
        }

        .food-item, .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            transition: 0.2s;
        }

        .food-item:hover, .order-item:hover {
            background: #fafafa;
        }

        .food-info h4 {
            margin-bottom: 0.2rem;
        }

        .food-info p {
            color: var(--primary);
            font-weight: 600;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-delivered { background: #d4edda; color: #155724; }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>FoodExpress - Restaurant</h1>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">
    <!-- QUICK STATS -->
    <div class="card" style="grid-column: span 2; display: flex; justify-content: space-around; text-align: center;">
        <div>
            <h3 style="color: var(--gray); font-size: 0.9rem; text-transform: uppercase;">Total Earnings</h3>
            <p id="statEarnings" style="font-size: 2rem; font-weight: 800; color: var(--primary);">Rs. 0</p>
        </div>
        <div style="border-left: 1px solid #eee; height: 50px; align-self: center;"></div>
        <div>
            <h3 style="color: var(--gray); font-size: 0.9rem; text-transform: uppercase;">Pending Orders</h3>
            <p id="statPending" style="font-size: 2rem; font-weight: 800; color: #fbc02d;">0</p>
        </div>
    </div>

    <!-- LEFT SIDE: ADD FOOD -->
    <div class="card">
        <h2>Add New Food</h2>
        <div class="form-group">
            <label>Food Name</label>
            <input type="text" id="foodName" placeholder="e.g. Double Cheese Pizza">
        </div>
        <div class="form-group">
            <label>Price (Rs.)</label>
            <input type="number" id="foodPrice" placeholder="e.g. 1500">
        </div>
        <button class="btn" onclick="addFood()">Add Item</button>
    </div>

    <!-- RIGHT SIDE: FOOD LIST -->
    <div class="card">
        <h2>Menu Management</h2>
        <ul class="food-list" id="foodList">
            <!-- Loaded via JS -->
        </ul>
    </div>

    <!-- FULL WIDTH: ORDERS -->
    <div class="card" style="grid-column: span 2;">
        <h2>Recent Orders</h2>
        <ul class="order-list" id="orderList">
            <!-- Loaded via JS -->
        </ul>
    </div>
</div>

<script>
    // GET RESTAURANT ID FROM URL
    const urlParams = new URLSearchParams(window.location.search);
    const currentRestaurantId = urlParams.get("userId");

    // LOAD DATA ON START
    window.onload = () => {
        if(!currentRestaurantId) {
            alert("No restaurant ID found. Redirecting to login.");
            window.location.href = "/login";
            return;
        }
        loadFoods();
        loadOrders();
        loadStats();
    };

    function loadStats() {
        fetch('/api/restaurant/stats/' + currentRestaurantId)
            .then(res => res.json())
            .then(data => {
                document.getElementById('statEarnings').innerText = 'Rs. ' + data.totalEarnings;
                document.getElementById('statPending').innerText = data.pendingOrders;
            });
    }

    function loadFoods() {
        fetch('/foods')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('foodList');
                list.innerHTML = '';
                
                // FILTER BY RESTAURANT ID
                const filteredData = data.filter(food => food.restaurantId === currentRestaurantId);

                filteredData.forEach(food => {
                    list.innerHTML += `
                        <li class="food-item">
                            <div class="food-info">
                                <h4>${food.foodName}</h4>
                                <p>Rs. ${food.price}</p>
                            </div>
                            <button class="delete-btn" onclick="deleteFood('${food.foodId}')">Delete</button>
                        </li>
                    `;
                });
                
                if(filteredData.length === 0) {
                    list.innerHTML = '<li class="food-item"><p style="color: gray;">No items in your menu yet.</p></li>';
                }
            });
    }

    function loadOrders() {
        fetch('/orders')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('orderList');
                list.innerHTML = '';
                
                // FILTER BY RESTAURANT ID
                const filteredData = data.filter(order => order.restaurantId === currentRestaurantId);

                filteredData.reverse().forEach(order => {
                    const badgeClass = order.status === 'PENDING' ? 'badge-pending' : 'badge-delivered';
                    list.innerHTML += `
                        <li class="order-item">
                            <div>
                                <strong>Order #${order.orderId}</strong> - ${order.foodName}<br>
                                <small>Customer: ${order.customerId} | Total: Rs. ${order.total}</small>
                            </div>
                            <span class="badge ${badgeClass}">${order.status}</span>
                        </li>
                    `;
                });

                if(filteredData.length === 0) {
                    list.innerHTML = '<li class="order-item"><p style="color: gray;">No orders found for your restaurant.</p></li>';
                }
            });
    }

    function addFood() {
        const name = document.getElementById('foodName').value;
        const price = document.getElementById('foodPrice').value;

        if(!name || !price) return alert("Please fill all fields");

        const food = { 
            foodName: name, 
            price: parseFloat(price),
            restaurantId: currentRestaurantId // ASSOCIATE WITH THIS RESTAURANT
        };

        fetch('/foods', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(food)
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById('foodName').value = '';
            document.getElementById('foodPrice').value = '';
            loadFoods();
            loadStats();
        });
    }

    function deleteFood(id) {
        if(!confirm("Are you sure?")) return;
        fetch('/foods/' + id, { method: 'DELETE' })
            .then(() => {
                loadFoods();
                loadStats();
            });
    }

    function logout() {
        window.location.href = "/login";
    }
</script>

</body>
</html>
