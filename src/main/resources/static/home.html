<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FoodExpress</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .navbar{

            width:100%;
            padding:20px 50px;

            background:#ff5722;
            color:white;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar h1{
            font-size:32px;
        }

        .nav-buttons button{

            margin-left:10px;

            padding:10px 20px;

            border:none;
            border-radius:8px;

            cursor:pointer;

            font-weight:bold;

            background:white;
            color:#ff5722;
        }

        .hero{

            height:90vh;

            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;

            text-align:center;
            padding:20px;
        }

        .hero h2{

            font-size:60px;
            color:#333;

            margin-bottom:20px;
        }

        .hero p{

            font-size:22px;
            color:gray;

            margin-bottom:30px;
        }

        .hero button{

            padding:15px 35px;

            border:none;
            border-radius:10px;

            background:#ff5722;
            color:white;

            font-size:18px;
            cursor:pointer;

            transition:0.3s;
        }

        .hero button:hover{

            background:#e64a19;
            transform:scale(1.05);
        }

        .features{

            display:grid;

            grid-template-columns:
                    repeat(auto-fit,
                    minmax(250px,1fr));

            gap:20px;

            padding:50px;
        }

        .feature-card{

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0 4px 10px
            rgba(0,0,0,0.1);

            text-align:center;
        }

        .feature-card h3{

            margin-bottom:15px;
            color:#ff5722;
        }

        footer{

            margin-top:40px;

            background:#222;
            color:white;

            text-align:center;

            padding:20px;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <h1>FoodExpress</h1>

    <div class="nav-buttons">

        <button onclick="goLogin()">
            Login
        </button>

        <button onclick="goRegister()">
            Register
        </button>

    </div>

</div>

<!-- HERO SECTION -->
<div class="hero">

    <h2>
        Fast Food Delivery
    </h2>

    <p>
        Order your favorite meals anytime,
        anywhere.
    </p>

    <button onclick="goLogin()">

        Order Now

    </button>

</div>

<!-- FEATURES -->
<div class="features">

    <div class="feature-card">

        <h3>
            Fast Delivery
        </h3>

        <p>
            Get your food delivered quickly
            by our delivery partners.
        </p>

    </div>

    <div class="feature-card">

        <h3>
            Fresh Food
        </h3>

        <p>
            Restaurants provide freshly
            prepared meals every day.
        </p>

    </div>

    <div class="feature-card">

        <h3>
            Easy Ordering
        </h3>

        <p>
            Add food to cart and place
            orders easily.
        </p>

    </div>

</div>

<!-- FOOTER -->
<footer>

    <h3>
        FoodExpress © 2026
    </h3>

</footer>

<script>

    function goLogin(){

        window.location.href =
            "/login";
    }

    function goRegister(){

        window.location.href =
            "/register";
    }

</script>

</body>
</html>
